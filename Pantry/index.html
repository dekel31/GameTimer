<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pantry Tracker</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f5f5f5; --card: #ffffff; --width: 360px; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: var(--width); min-height: 100vh; background: var(--card); box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .tabs { display: flex; background: #eee; }
        .tab { flex: 1; padding: 12px; text-align: center; border: none; font-weight: bold; }
        .tab.active { background: var(--card); border-bottom: 3px solid var(--primary); }
        .section { padding: 15px; display: none; }
        .section.active { display: block; }
        .input-group { margin-bottom: 15px; display: flex; gap: 5px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .exp-red { color: #d32f2f; font-weight: bold; }
        .btn-pantry { font-size: 0.8em; padding: 5px; background: #e8f5e9; color: var(--primary); border: 1px solid var(--primary); border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <header><h2 style="margin:0;">My Kitchen</h2></header>
    <div class="tabs">
        <button class="tab active" onclick="showTab('master')">Master List</button>
        <button class="tab" onclick="showTab('pantry')">Pantry</button>
    </div>

    <!-- Master List -->
    <div id="master" class="section active">
        <h4>Add Frequent Item</h4>
        <div class="input-group">
            <input type="text" id="itemName" placeholder="Item Name" style="flex: 2;">
            <input type="number" id="itemDays" placeholder="Days" style="flex: 1;">
            <button onclick="addToMaster()" style="background:var(--primary); color:white; border:none; padding:10px;">Add</button>
        </div>
        <ul id="masterList" style="list-style:none; padding:0;"></ul>
    </div>

    <!-- Pantry -->
    <div id="pantry" class="section">
        <h4>In Stock</h4>
        <ul id="pantryList" style="list-style:none; padding:0;"></ul>
    </div>
</div>

<script>
    let masterItems = JSON.parse(localStorage.getItem('masterItems')) || [];
    let pantryItems = JSON.parse(localStorage.getItem('pantryItems')) || [];

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        render();
    }

    function addToMaster() {
        const name = document.getElementById('itemName').value;
        const days = document.getElementById('itemDays').value || 7; // Default 7 if empty
        if (name) {
            masterItems.push({ name, defaultDays: parseInt(days) });
            document.getElementById('itemName').value = '';
            document.getElementById('itemDays').value = '';
            save();
            render();
        }
    }

    function quickAddToPantry(name, days) {
        const expiry = new Date();
        expiry.setDate(expiry.getDate() + days);
        const dateString = expiry.toISOString().split('T')[0];

        pantryItems.push({ name, expiry: dateString });
        save();
        alert(`Added ${name}! Expires: ${dateString}`);
    }

    function removeFromPantry(index) {
        pantryItems.splice(index, 1);
        save();
        render();
    }

    function save() {
        localStorage.setItem('masterItems', JSON.stringify(masterItems));
        localStorage.setItem('pantryItems', JSON.stringify(pantryItems));
    }

    function render() {
        const mList = document.getElementById('masterList');
        mList.innerHTML = masterItems.map(item => `
            <li class="item-card">
                <span>${item.name} (${item.defaultDays}d)</span>
                <button class="btn-pantry" onclick="quickAddToPantry('${item.name}', ${item.defaultDays})">+ Pantry</button>
            </li>
        `).join('');

        const pList = document.getElementById('pantryList');
        pList.innerHTML = pantryItems.map((item, index) => {
            const isExpired = new Date(item.expiry) < new Date();
            return `
                <li class="item-card">
                    <div><strong>${item.name}</strong><br><small class="${isExpired ? 'exp-red' : ''}">Exp: ${item.expiry}</small></div>
                    <button onclick="removeFromPantry(${index})">Remove</button>
                </li>
            `;
        }).join('');
    }
    render();
</script>
</body>
</html>
