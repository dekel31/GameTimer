<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry Tracker Pro</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f5f5f5; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .container { width: 100%; max-width: 360px; margin: 0 auto; background: var(--card); min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; background: #eee; position: sticky; top: 54px; z-index: 99; }
        .tab { flex: 1; padding: 12px; border: none; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--card); border-bottom: 3px solid var(--primary); }
        .section { padding: 15px; display: none; overflow-x: auto; } /* Horizontal scroll enabled */
        .section.active { display: block; }
        .input-group { display: grid; gap: 8px; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; min-width: 340px; }
        .btn-pantry { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 4px; }
        .alert-info { font-size: 0.75em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <header><h2 style="margin:0;">Pantry Tracker</h2></header>
    <div class="tabs">
        <button class="tab active" onclick="showTab('master', this)">Master</button>
        <button class="tab" onclick="showTab('pantry', this)">Pantry</button>
    </div>

    <!-- Master List -->
    <div id="master" class="section active">
        <div class="input-group">
            <input type="text" id="mName" placeholder="Product Name">
            <input type="number" id="mDays" placeholder="Days to Expire (e.g. 7)">
            <input type="number" id="mNotify" placeholder="Notify X days before">
            <button onclick="addToMaster()" class="btn-pantry">Save to Master List</button>
        </div>
        <button onclick="requestNotifs()" style="width:100%; margin-bottom:10px;">🔔 Enable 10AM Alerts</button>
        <div id="masterList"></div>
    </div>

    <!-- Pantry -->
    <div id="pantry" class="section">
        <h4>In Stock</h4>
        <div id="pantryList"></div>
    </div>
</div>

<script>
    let masterItems = JSON.parse(localStorage.getItem('masterItems')) || [];
    let pantryItems = JSON.parse(localStorage.getItem('pantryItems')) || [];

    function requestNotifs() {
        Notification.requestPermission().then(p => { if(p === 'granted') checkDailySchedule(); });
    }

    function addToMaster() {
        const name = document.getElementById('mName').value;
        const days = parseInt(document.getElementById('mDays').value);
        const notifyBefore = parseInt(document.getElementById('mNotify').value) || 0;
        
        if (name && !isNaN(days)) {
            masterItems.push({ name, days, notifyBefore });
            saveAndRender();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    }

    function addToPantry(item) {
        const now = new Date();
        const expiry = new Date(now.getTime() + (item.days * 24 * 60 * 60 * 1000));
        const notifyDate = new Date(expiry.getTime() - (item.notifyBefore * 24 * 60 * 60 * 1000));
        
        // Set notification trigger to 10:00 AM on the calculated notifyDate
        notifyDate.setHours(10, 0, 0, 0);

        pantryItems.push({ 
            name: item.name, 
            expiry: expiry.toISOString().split('T')[0],
            notifyAt: notifyDate.getTime(),
            notified: false
        });
        saveAndRender();
        alert(`${item.name} added. Alert set for 10am, ${item.notifyBefore} days before expiry.`);
    }

    function checkDailySchedule() {
        if (Notification.permission !== "granted") return;
        const now = new Date().getTime();
        
        pantryItems.forEach(item => {
            if (!item.notified && now >= item.notifyAt) {
                new Notification("Pantry Alert", {
                    body: `${item.name} is expiring soon (on ${item.expiry})!`,
                    icon: "https://via.placeholder.com"
                });
                item.notified = true;
            }
        });
        saveAndRender();
    }

    // Check every hour if it's 10am for any items
    setInterval(checkDailySchedule, 3600000);

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function saveAndRender() {
        localStorage.setItem('masterItems', JSON.stringify(masterItems));
        localStorage.setItem('pantryItems', JSON.stringify(pantryItems));
        render();
    }

    function render() {
        document.getElementById('masterList').innerHTML = masterItems.map(item => `
            <div class="item-card">
                <div>
                    <strong>${item.name}</strong><br>
                    <span class="alert-info">Life: ${item.days}d | Alert: ${item.notifyBefore}d before</span>
                </div>
                <button class="btn-pantry" onclick='addToPantry(${JSON.stringify(item)})'>+ Pantry</button>
            </div>
        `).join('');

        document.getElementById('pantryList').innerHTML = pantryItems.map((item, i) => `
            <div class="item-card">
                <div>
                    <strong>${item.name}</strong><br>
                    <small>Expires: ${item.expiry}</small>
                </div>
                <button onclick="pantryItems.splice(${i},1);saveAndRender();">Remove</button>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
